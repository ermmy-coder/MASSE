exp_name: masse_dblp_author_disable_expansion

dataset: DBLP

center_type: author

meta_paths:
  # P-A-P: 1.0
  # P-T-P: 1.0
  # P-C-P: 1.0
  A-P-A: 1.0
  A-P-T-P-A: 1.0
  A-P-C-P-A: 1.0

thresholds:
  # P-A-P: 1
  # P-T-P: 5
  # P-C-P: 1
  A-P-A: 2
  A-P-T-P-A: 2000
  A-P-C-P-A: 50

consensus:

  min_agree: 1

  normalize: agree_only

masse:

  reliability:

    enabled: true

    entropy_temperature: 1.0

    min_reliability: 0.01
    
  subspace:

    n_clusters: 2

  interaction:

    enabled: true

#     aggregation: mean

#     topk: 10

  consensus:

    min_agree: 1

    normalize: agree_only

    # semantic_alpha: 0.3

  expansion:

    enabled: true

    probability_threshold: 0.3

    softmax_temperature: 1.0

    overlap_normalize: true

ablation:

  disable_reliability: false

  disable_interaction: false

  disable_subspace: false

  disable_fusion: false

  disable_expansion: false
  
seed: 42